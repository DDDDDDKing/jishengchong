<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>寄生虫红色单词卡片</title>
  <style>
    :root {
      --bg1: #f8fafc;
      --bg2: #eef2ff;
      --card: rgba(255,255,255,0.92);
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --red: #dc2626;
      --green: #16a34a;
      --blue: #2563eb;
      --orange: #ea580c;
      --shadow: 0 20px 60px rgba(15, 23, 42, 0.14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 10%, #ffffff 0, transparent 30%), linear-gradient(135deg, var(--bg1), var(--bg2));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }
    .app {
      width: min(960px, 100%);
    }
    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .title h1 {
      margin: 0 0 4px;
      font-size: clamp(22px, 4vw, 34px);
      letter-spacing: 0.02em;
    }
    .title p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }
    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .pill {
      background: rgba(255,255,255,0.78);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      color: #374151;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      white-space: nowrap;
    }
    .stage {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: clamp(22px, 5vw, 44px);
      backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
    }
    .stage::after {
      content: "";
      position: absolute;
      width: 260px;
      height: 260px;
      right: -120px;
      top: -120px;
      background: rgba(220, 38, 38, 0.08);
      border-radius: 50%;
      pointer-events: none;
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }
    .word {
      min-height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: clamp(34px, 7vw, 68px);
      line-height: 1.12;
      font-weight: 800;
      letter-spacing: 0.01em;
      padding: 20px 6px 10px;
      position: relative;
      z-index: 1;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }
    .redmark {
      color: var(--red);
      text-decoration: underline;
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.12em;
    }
    .meaning {
      text-align: center;
      min-height: 72px;
      color: #374151;
      font-size: clamp(17px, 3vw, 24px);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      margin: 10px 0 20px;
      position: relative;
      z-index: 1;
    }
    .meaning.hidden {
      color: var(--muted);
      font-size: 16px;
    }
    .related {
      font-size: 14px;
      color: var(--muted);
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      position: relative;
      z-index: 1;
    }
    button {
      border: none;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
      box-shadow: 0 10px 22px rgba(15,23,42,0.08);
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(1px) scale(0.99); }
    .known { background: #dcfce7; color: #166534; }
    .unknown { background: #fee2e2; color: #991b1b; }
    .small-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 16px;
      position: relative;
      z-index: 1;
    }
    .small-actions button {
      font-size: 14px;
      padding: 10px 12px;
      border-radius: 999px;
      background: #fff;
      color: #374151;
      border: 1px solid var(--line);
      box-shadow: none;
    }
    .progress-wrap {
      height: 10px;
      background: #e5e7eb;
      border-radius: 999px;
      margin-top: 20px;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }
    .progress { height: 100%; width: 0%; background: linear-gradient(90deg, var(--blue), var(--green)); transition: width 0.25s ease; }
    .panel {
      margin-top: 16px;
      display: none;
      background: rgba(255,255,255,0.82);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 16px;
      max-height: 260px;
      overflow: auto;
    }
    .panel.show { display: block; }
    .panel ol { margin: 0; padding-left: 22px; }
    .panel li { margin: 7px 0; }
    @media (max-width: 620px) {
      body { padding: 14px; align-items: flex-start; }
      .stage { border-radius: 22px; padding: 22px 16px; }
      .actions { grid-template-columns: 1fr; }
      .word { min-height: 130px; }
    }
  </style>
</head>

        <p>共 <strong id="total">0</strong> 个标红词条；点击认识/不认识后自动进入下一个。</p>

      <div class="stats">

      <div class="actions">

        <button id="shuffleBtn">重新随机</button>

      </div>
      <div class="progress-wrap"><div class="progress" id="progress"></div></div>
      <div class="panel" id="unknownPanel"></div>

    const STORAGE_KEY = 'parasite_red_vocab_v1';

    let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"known":{},"unknown":{}}');
    let deck = [];
    let index = 0;
    let meaningShown = false;
    let unknownMode = false;

    const $ = id => document.getElementById(id);
    const cleanSpeakText = text => text.replace(/[（(].*?[）)]/g, '').trim();

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }
    function makeDeck(onlyUnknown = false) {
      unknownMode = onlyUnknown;
      const base = onlyUnknown ? WORDS.filter(w => state.unknown[w.word]) : WORDS.slice();
      deck = shuffle(base.length ? base : WORDS.slice());
      index = 0;
      meaningShown = false;
      render();
    }
    function current() {
      if (!deck.length) makeDeck(false);
      return deck[index % deck.length];
    }
    function renderStats() {
      const known = Object.keys(state.known).length;
      const unknown = Object.keys(state.unknown).length;
      $('total').textContent = WORDS.length;
      $('knownCount').textContent = known;
      $('unknownCount').textContent = unknown;
      $('done').textContent = Math.min(known + unknown, WORDS.length);
      $('progress').style.width = `${Math.min(100, ((known + unknown) / WORDS.length) * 100)}%`;
    }
    function render() {
      renderStats();
      const w = current();
      $('counter').textContent = `第 ${index + 1} / ${deck.length} 个${unknownMode ? '（不认识复习）' : ''}`;
      $('source').textContent = w.source + (w.redParts ? `｜标红：${w.redParts}` : '');
      $('word').innerHTML = w.html;
      $('meaning').className = meaningShown ? 'meaning' : 'meaning hidden';
      if (meaningShown) {
        $('meaning').innerHTML = `<div>${w.meaning || '（无中文释义）'}</div>` + (w.related ? `<div class="related">对应英文名：${w.related}</div>` : '');
        $('showMeaningBtn').textContent = '隐藏中文';
      } else {
        $('meaning').textContent = '点击“显示中文”再看释义';
        $('showMeaningBtn').textContent = '显示中文';
      }
      renderUnknownPanel();
    }
    function nextCard() {
      if (!deck.length) return;
      index = (index + 1) % deck.length;
      meaningShown = false;
      render();
    }
    function markKnown() {
      const w = current();
      state.known[w.word] = true;
      delete state.unknown[w.word];
      save();
      if (unknownMode) deck = deck.filter(x => x.word !== w.word);
      if (!deck.length) makeDeck(false); else nextCard();
    }
    function markUnknown() {
      const w = current();
      state.unknown[w.word] = true;
      delete state.known[w.word];
      save();
      nextCard();
    }
    function renderUnknownPanel() {
      const panel = $('unknownPanel');
      if (!panel.classList.contains('show')) return;
      const list = WORDS.filter(w => state.unknown[w.word]);
      if (!list.length) {
        panel.innerHTML = '<strong>目前没有“不认识”的词。</strong>';
        return;
      }
      panel.innerHTML = '<strong>不认识列表：</strong><ol>' + list.map(w => `<li>${w.html} — ${w.meaning || ''}</li>`).join('') + '</ol>';
    }
    function speakCurrent() {
      const w = current();
      if (!('speechSynthesis' in window)) return;
      speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(cleanSpeakText(w.word));
      utterance.lang = 'en-US';
      utterance.rate = 0.82;
      speechSynthesis.speak(utterance);
    }

    $('knownBtn').onclick = markKnown;
    $('unknownBtn').onclick = markUnknown;
    $('skipBtn').onclick = nextCard;
    $('showMeaningBtn').onclick = () => { meaningShown = !meaningShown; render(); };
    $('speakBtn').onclick = speakCurrent;
    $('shuffleBtn').onclick = () => makeDeck(false);
    $('reviewUnknownBtn').onclick = () => makeDeck(true);
    $('resetBtn').onclick = () => {
      if (confirm('确定清空认识/不认识记录吗？')) {
        state = {known: {}, unknown: {}};
        save();
        makeDeck(false);
      }
    };
    $('unknownPanel').onclick = () => {};
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft' || e.key === '1') markKnown();
      if (e.key === 'ArrowRight' || e.key === '2') markUnknown();
      if (e.key === ' ') { e.preventDefault(); meaningShown = !meaningShown; render(); }
      if (e.key.toLowerCase() === 's') speakCurrent();
    });
    $('toggleUnknownBtn').onclick = () => {
      $('unknownPanel').classList.toggle('show');
      renderUnknownPanel();
    };
    $('reviewUnknownBtn').addEventListener('contextmenu', e => e.preventDefault());

    makeDeck(false);
  </script>
</body>
</html>
